<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Estoque Pro | Offline + Backup</title>
    <style>
        :root {
            --primary: #1b4332;
            --accent: #2d6a4f;
            --success: #27ae60;
            --warning: #f39c12;
            --danger: #e74c3c;
            --bg: #f0f4f8;
            --card-bg: #ffffff;
            --text: #2c3e50;
            --text-secondary: #64748b;
            --border: #e2e8f0;
            --shadow: 0 4px 12px rgba(0,0,0,0.08);
            --radius: 18px;
            --sidebar-width: 260px;
            --header-bg: #1b4332;
            --header-text: white;
            --sidebar-bg: white;
            --sidebar-text: #334155;
            --hover-bg: #f1f5f9;
            --active-bg: #e8f0fe;
        }
        body.dark {
            --primary: #0f2c24;
            --accent: #3a8c6e;
            --success: #2ecc71;
            --bg: #121212;
            --card-bg: #1e1e2e;
            --text: #e2e8f0;
            --text-secondary: #94a3b8;
            --border: #2d2d3a;
            --shadow: 0 4px 12px rgba(0,0,0,0.3);
            --header-bg: #0a1e18;
            --header-text: #e2e8f0;
            --sidebar-bg: #1a1a2a;
            --sidebar-text: #cbd5e1;
            --hover-bg: #2d2d3a;
            --active-bg: #1e3a3a;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background: var(--bg); color: var(--text); transition: background-color 0.2s ease; }
       .app-layout { display: flex; min-height: 100vh; position: relative; }
       .sidebar { width: var(--sidebar-width); background: var(--sidebar-bg); box-shadow: 2px 0 12px rgba(0,0,0,0.05); position: fixed; left: 0; top: 0; bottom: 0; z-index: 50; overflow-y: auto; transition: transform 0.3s ease; }
       .sidebar-header { background: var(--primary); color: white; padding: 24px 16px; text-align: center; }
       .sidebar-header h3 { font-size: 1.1rem; display: flex; align-items: center; justify-content: center; gap: 8px; }
       .categoria-item { padding: 14px 20px; display: flex; align-items: center; gap: 12px; cursor: pointer; transition: all 0.2s; border-left: 3px solid transparent; font-weight: 500; color: var(--sidebar-text); }
       .categoria-item:hover { background: var(--hover-bg); }
       .categoria-item.active { background: var(--active-bg); border-left-color: var(--accent); color: var(--accent); font-weight: 700; }
       .categoria-item.badge-count { margin-left: auto; background: var(--border); padding: 2px 8px; border-radius: 20px; font-size: 0.7rem; }
       .main-content { margin-left: var(--sidebar-width); flex: 1; padding: 20px; transition: margin-left 0.3s; }
       .header { background: var(--header-bg); color: var(--header-text); padding: 16px 20px; border-radius: var(--radius); margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; box-shadow: var(--shadow); }
       .header-left { display: flex; align-items: center; gap: 12px; }
       .menu-toggle { background: var(--accent); color: white; border: none; padding: 10px 14px; border-radius: 12px; cursor: pointer; display: none; }
       .search-box { padding: 10px 16px; border-radius: 12px; border: none; width: 250px; background: rgba(255,255,255,0.2); color: white; }
       .search-box::placeholder { color: rgba(255,255,255,0.7); }
       .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
       .card { background: var(--card-bg); padding: 20px; border-radius: 24px; box-shadow: var(--shadow); position: relative; transition: transform 0.2s; }
       .card:hover { transform: translateY(-2px); }
       .card h2 { font-size: 18px; margin: 8px 0; word-break: break-word; }
       .price { font-size: 24px; font-weight: 700; color: var(--success); margin: 12px 0; }
       .stock-info { display: flex; justify-content: space-between; margin: 12px 0; font-size: 14px; }
       .btn-group,.btn-group-special { display: flex; gap: 8px; margin-top: 12px; }
       .btn { padding: 10px; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; flex: 1; transition: opacity 0.2s; }
       .btn:hover { opacity: 0.8; }
       .btn-venda { background: var(--success); color: white; }
       .btn-repor { background: var(--accent); color: white; }
       .btn-multi { background: var(--primary); color: white; font-size: 12px; }
       .btn-edit { position: absolute; top: 12px; right: 12px; background: var(--warning); color: white; border: none; width: 32px; height: 32px; border-radius: 50%; cursor: pointer; }
       .btn-delete { position: absolute; top: 12px; right: 52px; background: var(--danger); color: white; border: none; width: 32px; height: 32px; border-radius: 50%; cursor: pointer; }
       .badge-cat { background: var(--active-bg); color: var(--accent); padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; }
       .low-stock { border: 2px solid var(--danger); }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid var(--border); border-radius: 12px; background: var(--bg); color: var(--text); }
       .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 1000; }
       .modal-content { background: var(--card-bg); padding: 30px; border-radius: 24px; width: 90%; max-width: 500px; max-height: 90vh; overflow-y: auto; }
       .history-item { background: var(--card-bg); padding: 12px; margin: 8px 0; border-radius: 12px; display: flex; justify-content: space-between; box-shadow: var(--shadow); }
       .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: var(--accent); color: white; padding: 12px 24px; border-radius: 12px; z-index: 9999; box-shadow: var(--shadow); animation: slideUp 0.3s; }
        @keyframes slideUp { from { transform: translate(-50%, 100px); opacity: 0; } to { transform: translate(-50%, 0); opacity: 1; } }
       .toolbar { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
       .toolbar select,.toolbar button { padding: 8px 12px; border-radius: 10px; border: 1px solid var(--border); background: var(--card-bg); color: var(--text); cursor: pointer; }
        @media (max-width: 768px) {
           .sidebar { transform: translateX(-100%); }
           .sidebar.open { transform: translateX(0); }
           .main-content { margin-left: 0; }
           .menu-toggle { display: block; }
           .search-box { width: 150px; }
        }
    </style>
</head>
<body>
    <div class="app-layout">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h3>📦 Estoque Pro</h3>
                <small>v2.0 - Offline</small>
            </div>
            <div id="sidebarCategorias"></div>
            <div style="padding: 20px; border-top: 1px solid var(--border); margin-top: auto;">
                <button class="btn" style="background:var(--accent);color:white;width:100%;margin-bottom:8px;" onclick="exportarBackup()">💾 Exportar Backup</button>
                <input type="file" id="importFile" accept=".json" style="display:none" onchange="importarBackup(this.files[0])">
                <button class="btn" style="background:var(--primary);color:white;width:100%;margin-bottom:8px;" onclick="document.getElementById('importFile').click()">📂 Importar Backup</button>
                <button class="btn" style="background:var(--text-secondary);color:white;width:100%;" onclick="alternarTema()">🌓 Alternar Tema</button>
            </div>
        </aside>

        <main class="main-content">
            <div class="header">
                <div class="header-left">
                    <button class="menu-toggle" onclick="document.getElementById('sidebar').classList.toggle('open')">☰</button>
                    <h1>Dashboard</h1>
                </div>
                <div style="display:flex;gap:12px;align-items:center;flex-wrap:wrap;">
                    <input type="text" class="search-box" id="busca" placeholder="🔍 Buscar produto...">
                    <div>
                        <span>Total: <b id="totalValue">R$ 0,00</b></span> |
                        <span>Itens: <b id="totalItems">0</b></span>
                    </div>
                </div>
            </div>

            <div class="toolbar">
                <select id="ordenar" onchange="render()">
                    <option value="nome">Ordenar: Nome A-Z</option>
                    <option value="nome_desc">Nome Z-A</option>
                    <option value="preco">Menor Preço</option>
                    <option value="preco_desc">Maior Preço</option>
                    <option value="qtd">Menor Estoque</option>
                    <option value="qtd_desc">Maior Estoque</option>
                </select>
                <button onclick="abrirModal()">➕ Novo Produto</button>
                <button onclick="abrirRelatorio()">📈 Relatório</button>
            </div>

            <div id="filtroInfo" style="margin-bottom:16px;font-weight:600;"></div>
            <div id="grid" class="grid"></div>

            <h3 style="margin-top:30px;">📜 Últimas Vendas</h3>
            <div id="historyList"></div>
        </main>
    </div>

    <!-- Modal Produto -->
    <div id="modal" class="modal"><div class="modal-content">
        <h2 id="modalTitle">Novo Produto</h2>
        <input id="pNome" placeholder="Nome do produto" maxlength="100">
        <input id="pPreco" type="number" step="0.01" min="0.01" max="1000000" placeholder="Preço">
        <input id="pQtd" type="number" min="0" max="999999" placeholder="Quantidade">
        <input id="pUn" placeholder="Unidade (ex: un, kg, cx)" maxlength="10" value="un">
        <select id="pCat">
            <option>GERAL</option>
            <option>BEBIDAS</option>
            <option>COMIDA</option>
            <option>LIMPEZA</option>
            <option>HIGIENE</option>
            <option>OUTROS</option>
        </select>
        <div class="btn-group">
            <button class="btn btn-venda" onclick="salvarProduto()">SALVAR</button>
            <button class="btn" style="background:var(--danger);color:white;" onclick="fecharModal()">CANCELAR</button>
        </div>
    </div></div>

    <!-- Modal Venda -->
    <div id="modalVenda" class="modal"><div class="modal-content">
        <h2 id="vendaProdutoNome"></h2>
        <p>Estoque disponível: <b id="vendaEstoqueAtual"></b> <span id="vendaUnidadeLabel"></span></p>
        <p>Preço unitário: R$ <b id="vendaPrecoUnitario"></b></p>
        <input id="vendaQuantidade" type="number" value="1" min="1">
        <div class="btn-group-special">
            <button class="btn btn-multi" onclick="setVendaQtd(1)">+1</button>
            <button class="btn btn-multi" onclick="setVendaQtd(5)">+5</button>
            <button class="btn btn-multi" onclick="setVendaQtd(10)">+10</button>
            <button class="btn btn-multi" onclick="setVendaQtd('max')">MAX</button>
        </div>
        <p style="margin:16px 0; font-size:20px;">Total: R$ <b id="totalVendaValor">0.00</b></p>
        <div class="btn-group">
            <button class="btn btn-venda" onclick="confirmarVenda()">CONFIRMAR VENDA</button>
            <button class="btn" style="background:var(--danger);color:white;" onclick="fecharModalVenda()">CANCELAR</button>
        </div>
    </div></div>

<script>
    // CONSTANTES
    const ESTOQUE_MINIMO = 5;
    const KEY_DB = 'estoque_db_v2';
    const KEY_HIST = 'estoque_hist_v2';
    const KEY_TEMA = 'estoque_tema';

    // ESTADO
    let db = JSON.parse(localStorage.getItem(KEY_DB) || '[]');
    let hist = JSON.parse(localStorage.getItem(KEY_HIST) || '[]');
    let filtro = 'todos';
    let termoBusca = '';
    let ordenacao = 'nome';
    let editId = null;
    let vendaTempId = null;

    // INICIALIZAÇÃO
    if(localStorage.getItem(KEY_TEMA) === 'dark') document.body.classList.add('dark');
    document.getElementById('busca').oninput = (e) => { termoBusca = e.target.value.toLowerCase(); render(); };
    document.getElementById('ordenar').onchange = (e) => { ordenacao = e.target.value; render(); };

    // UTILITÁRIOS
    function toast(msg, tipo = 'success') {
        const t = document.createElement('div');
        t.className = 'toast';
        t.textContent = msg;
        if(tipo === 'error') t.style.background = 'var(--danger)';
        if(tipo === 'warning') t.style.background = 'var(--warning)';
        document.body.appendChild(t);
        setTimeout(() => t.remove(), 3000);
    }

    function escapeHtml(str) {
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
    }

    function save() {
        localStorage.setItem(KEY_DB, JSON.stringify(db));
        localStorage.setItem(KEY_HIST, JSON.stringify(hist));
    }

    // CRUD PRODUTOS
    function salvarProduto() {
        const nome = document.getElementById('pNome').value.trim().slice(0, 100);
        const preco = Number(document.getElementById('pPreco').value);
        const qtd = Number(document.getElementById('pQtd').value);
        const un = document.getElementById('pUn').value.trim().slice(0, 10) || 'un';
        const cat = document.getElementById('pCat').value;

        // VALIDAÇÃO FORTE
        if (!nome) return toast('Nome obrigatório', 'error');
        if (!Number.isFinite(preco) || preco <= 0 || preco > 1000000) return toast('Preço inválido', 'error');
        if (!Number.isInteger(qtd) || qtd < 0 || qtd > 999999) return toast('Quantidade inválida', 'error');

        const dados = {
            id: editId || crypto.randomUUID(),
            nome, preco, qtd, un, cat,
            criadoEm: editId? undefined : new Date().toISOString(),
            atualizadoEm: new Date().toISOString()
        };

        if (editId) {
            const idx = db.findIndex(x => x.id === editId);
            if (idx!== -1) db[idx] = {...db[idx],...dados };
        } else {
            db.push(dados);
        }
        fecharModal();
        save();
        render();
        toast(editId? 'Produto atualizado!' : 'Produto cadastrado!');
    }

    function deletarProduto(id) {
        const p = db.find(x => x.id === id);
        if (!p) return;
        if (!confirm(`Deletar "${p.nome}"?\n\nEssa ação não pode ser desfeita.`)) return;
        db = db.filter(x => x.id!== id);
        save();
        render();
        toast('Produto deletado', 'warning');
    }

    function abrirModal() {
        editId = null;
        document.getElementById('modalTitle').textContent = "Novo Produto";
        document.querySelectorAll('#modal input').forEach(i => i.value = '');
        document.getElementById('pQtd').value = 0;
        document.getElementById('pUn').value = 'un';
        document.getElementById('modal').style.display = 'flex';
    }

    function abrirEdicao(id) {
        const p = db.find(x => x.id === id);
        if (!p) return;
        editId = id;
        document.getElementById('pNome').value = p.nome;
        document.getElementById('pPreco').value = p.preco;
        document.getElementById('pQtd').value = p.qtd;
        document.getElementById('pUn').value = p.un;
        document.getElementById('pCat').value = p.cat;
        document.getElementById('modalTitle').textContent = "Editar Produto";
        document.getElementById('modal').style.display = 'flex';
    }

    function fecharModal() {
        document.getElementById('modal').style.display = 'none';
        editId = null;
    }

    // VENDAS
    function abrirModalVenda(id) {
        const p = db.find(x => x.id === id);
        if (!p) return;
        vendaTempId = id;
        document.getElementById('vendaProdutoNome').textContent = p.nome;
        document.getElementById('vendaEstoqueAtual').textContent = p.qtd;
        document.getElementById('vendaUnidadeLabel').textContent = p.un;
        document.getElementById('vendaPrecoUnitario').textContent = p.preco.toFixed(2);
        document.getElementById('vendaQuantidade').value = 1;
        document.getElementById('vendaQuantidade').max = p.qtd;
        atualizarTotalVendaModal();
        document.getElementById('modalVenda').style.display = 'flex';
    }

    function atualizarTotalVendaModal() {
        const p = db.find(x => x.id === vendaTempId);
        if (!p) return;
        let qtd = parseInt(document.getElementById('vendaQuantidade').value) || 1;
        if (qtd > p.qtd) qtd = p.qtd;
        if (qtd < 1) qtd = 1;
        document.getElementById('vendaQuantidade').value = qtd;
        document.getElementById('totalVendaValor').textContent = (p.preco * qtd).toFixed(2);
    }

    function setVendaQtd(v) {
        const p = db.find(x => x.id === vendaTempId);
        if (!p) return;
        document.getElementById('vendaQuantidade').value = v === 'max'? p.qtd : v;
        atualizarTotalVendaModal();
    }

    function fecharModalVenda() {
        document.getElementById('modalVenda').style.display = 'none';
        vendaTempId = null;
    }

    function confirmarVenda() {
        const p = db.find(x => x.id === vendaTempId);
        if (!p) return;
        const qtd = parseInt(document.getElementById('vendaQuantidade').value) || 1;

        if (qtd <= 0) return toast('Quantidade inválida', 'error');
        if (p.qtd < qtd) return toast(`Estoque insuficiente! Só tem ${p.qtd}`, 'error');

        p.qtd -= qtd;
        p.atualizadoEm = new Date().toISOString();

        hist.unshift({
            id: crypto.randomUUID(),
            nome: p.nome,
            q: qtd,
            precoUnitario: p.preco,
            vendaTotal: p.preco * qtd,
            un: p.un,
            d: new Date().toISOString()
        });

        // Mantém só últimas 1000 vendas
        if (hist.length > 1000) hist = hist.slice(0, 1000);

        save();
        fecharModalVenda();
        render();
        toast(`Venda registrada: ${qtd}x ${p.nome}`);
    }

    function vendaRapida(id, qtd) {
        const p = db.find(x => x.id === id);
        if (!p) return;
        if (p.qtd < qtd) return toast(`Estoque baixo! Só tem ${p.qtd}`, 'warning');

        p.qtd -= qtd;
        p.atualizadoEm = new Date().toISOString();

        hist.unshift({
            id: crypto.randomUUID(),
            nome: p.nome,
            q: qtd,
            precoUnitario: p.preco,
            vendaTotal: p.preco * qtd,
            un: p.un,
            d: new Date().toISOString()
        });

        if (hist.length > 1000) hist = hist.slice(0, 1000);
        save();
        render();
        toast(`+${qtd} ${p.nome} vendido`);
    }

    // RENDERIZAÇÃO OTIMIZADA
    function render() {
        renderSidebar();
        renderProdutos();
        renderHistorico();
        renderTotais();
    }

    function renderSidebar() {
        const cats = ['GERAL', 'BEBIDAS', 'COMIDA', 'LIMPEZA', 'HIGIENE', 'OUTROS'];
        const contagem = {};
        cats.forEach(c => contagem[c] = db.filter(p => p.cat === c).length);

        let html = `
            <div class="categoria-item ${filtro === 'todos'? 'active' : ''}" onclick="setFiltro('todos')">
                <span>📊</span> Todos <span class="badge-count">${db.length}</span>
            </div>
            <div class="categoria-item ${filtro === 'baixo'? 'active' : ''}" onclick="setFiltro('baixo')">
                <span>⚠️</span> Estoque Baixo <span class="badge-count">${db.filter(p => p.qtd < ESTOQUE_MINIMO).length}</span>
            </div>
        `;

        cats.forEach(cat => {
            if (contagem[cat] > 0) {
                html += `
                    <div class="categoria-item ${filtro === cat? 'active' : ''}" onclick="setFiltro('${cat}')">
                        <span>📦</span> ${cat} <span class="badge-count">${contagem[cat]}</span>
                    </div>
                `;
            }
        });

        document.getElementById('sidebarCategorias').innerHTML = html;
    }

    function renderProdutos() {
        const grid = document.getElementById('grid');

        // FILTRO + BUSCA
        let produtosExibidos = db.filter(p => {
            const passaFiltro = filtro === 'todos' || filtro === 'baixo'?
                (filtro === 'baixo'? p.qtd < ESTOQUE_MINIMO : true) :
                p.cat === filtro;
            const passaBusca =!termoBusca || p.nome.toLowerCase().includes(termoBusca);
            return passaFiltro && passaBusca;
        });

        // ORDENAÇÃO
        produtosExibidos.sort((a, b) => {
            switch(ordenacao) {
                case 'nome': return a.nome.localeCompare(b.nome);
                case 'nome_desc': return b.nome.localeCompare(a.nome);
                case 'preco': return a.preco - b.preco;
                case 'preco_desc': return b.preco - a.preco;
                case 'qtd': return a.qtd - b.qtd;
                case 'qtd_desc': return b.qtd - a.qtd;
                default: return 0;
            }
        });

        // INFO DO FILTRO
        const textoFiltro = filtro === 'todos'? 'Todos os produtos' :
                           filtro === 'baixo'? 'Produtos com estoque baixo' :
                           `Categoria: ${filtro}`;
        document.getElementById('filtroInfo').textContent = `${textoFiltro} (${produtosExibidos.length})`;

        // RENDER COM FRAGMENT - PERFORMANCE
        const fragment = document.createDocumentFragment();

        if (produtosExibidos.length === 0) {
            const div = document.createElement('div');
            div.style.cssText = 'grid-column:1/-1; text-align:center; padding:60px 20px; background:var(--card-bg); border-radius:24px;';
            div.textContent = termoBusca? '✨ Nenhum produto encontrado' : '✨ Nenhum produto cadastrado';
            fragment.appendChild(div);
        } else {
            produtosExibidos.forEach(p => {
                const card = document.createElement('div');
                card.className = `card ${p.qtd < ESTOQUE_MINIMO? 'low-stock' : ''}`;

                const nome = escapeHtml(p.nome);
                const cat = escapeHtml(p.cat);
                const un = escapeHtml(p.un);

                card.innerHTML = `
                    <button class="btn-delete" onclick="deletarProduto('${p.id}')" title="Deletar">🗑</button>
                    <button class="btn-edit" onclick="abrirEdicao('${p.id}')" title="Editar">✎</button>
                    <span class="badge-cat">${cat}</span>
                    <h2 title="${nome}">${nome}</h2>
                    <div class="price">R$ ${p.preco.toFixed(2)}</div>
                    <div class="stock-info">
                        <div>📦 Estoque:</div>
                        <b>${p.qtd} <small>${un}</small></b>
                    </div>
                    <div class="btn-group">
                        <button class="btn btn-venda" onclick="abrirModalVenda('${p.id}')">VENDER</button>
                    </div>
                    <div class="btn-group-special">
                        <button class="btn btn-multi" onclick="vendaRapida('${p.id}', 1)">+1</button>
                        <button class="btn btn-multi" onclick="vendaRapida('${p.id}', 5)">+5</button>
                        <button class="btn btn-multi" onclick="vendaRapida('${p.id}', 10)">+10</button>
                    </div>
                `;
                fragment.appendChild(card);
            });
        }

        grid.innerHTML = '';
        grid.appendChild(fragment);
    }

    function renderHistorico() {
        const hList = document.getElementById('historyList');

        if (hist.length === 0) {
            hList.innerHTML = '<div style="text-align:center;padding:30px;color:var(--text-secondary);">Nenhuma venda registrada ainda</div>';
            return;
        }

        const fragment = document.createDocumentFragment();
        hist.slice(0, 20).forEach(h => {
            const item = document.createElement('div');
            item.className = 'history-item';
            const dataStr = h.d? new Date(h.d).toLocaleString('pt-BR') : '';
            item.innerHTML = `
                <span><b>${escapeHtml(h.nome)}</b> ${h.q}x ${escapeHtml(h.un)}</span>
                <span>R$ ${h.vendaTotal.toFixed(2)}<br><small>${dataStr}</small></span>
            `;
            fragment.appendChild(item);
        });

        hList.innerHTML = '';
        hList.appendChild(fragment);
    }

    function renderTotais() {
        let vTotal = 0, iTotal = 0;
        db.forEach(p => { vTotal += (p.preco * p.qtd); iTotal += Number(p.qtd); });
        document.getElementById('totalValue').textContent = `R$ ${vTotal.toFixed(2)}`;
        document.getElementById('totalItems').textContent = iTotal;
    }

    // FILTROS
    function setFiltro(f) {
        filtro = f;
        render();
        document.getElementById('sidebar').classList.remove('open');
    }

    // BACKUP
    function exportarBackup() {
        const dados = {
            versao: '2.0',
            db,
            hist,
            exportadoEm: new Date().toISOString()
        };
        const blob = new Blob([JSON.stringify(dados, null, 2)], { type: 'application/json' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `backup_estoque_${new Date().toISOString().split('T')[0]}.json`;
        a.click();
        URL.revokeObjectURL(a.href);
        toast('Backup exportado com sucesso!');
    }

    function importarBackup(file) {
        if (!file) return;
        const reader = new FileReader();
        reader.onload = e => {
            try {
                const backup = JSON.parse(e.target.result);
                if (!backup.db ||!backup.hist) throw new Error('Arquivo inválido');
                if (!confirm(`Importar backup de ${new Date(backup.exportadoEm).toLocaleString('pt-BR')}?\n\nIsso vai substituir todos os dados atuais.`)) return;
                db = backup.db;
                hist = backup.hist;
                save();
                render();
                toast('Backup restaurado com sucesso!');
            } catch (err) {
                toast('Erro ao importar: arquivo inválido', 'error');
            }
        };
        reader.readAsText(file);
    }

    // RELATÓRIO
    function abrirRelatorio() {
        const total = hist.reduce((sum, h) => sum + h.vendaTotal, 0);
        const porProduto = {};
        hist.forEach(h => {
            porProduto[h.nome] = (porProduto[h.nome] || 0) + h.vendaTotal;
        });
        const top5 = Object.entries(porProduto)
           .sort((a, b) => b[1] - a[1])
           .slice(0, 5)
           .map(([nome, total]) => `${nome}: R$ ${total.toFixed(2)}`)
           .join('\n');

        alert(`📈 RELATÓRIO GERAL\n\nTotal de vendas: ${hist.length}\nValor total: R$ ${total.toFixed(2)}\n\nTop 5 produtos:\n${top5 || 'Nenhuma venda'}`);
    }

    // TEMA
    function alternarTema() {
        document.body.classList.toggle('dark');
        localStorage.setItem(KEY_TEMA, document.body.classList.contains('dark')? 'dark' : 'light');
    }

    // EVENT LISTENERS
    document.getElementById('vendaQuantidade')?.addEventListener('input', atualizarTotalVendaModal);

    // INICIALIZA
    render();
</script>
</body>
</html>
